<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Arduino desde Cero · Scrum del Proyecto</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.js"></script>
<style>
  :root{
    --bg:#0a0a0a; --surface:#111; --surface2:#1a1a1a; --surface3:#222;
    --accent:#00ff88;
    --scrum:#a78bfa; --scrum-dim:#a78bfa22;
    --hw:#f97316; --sw:#3b82f6; --com:#ff6b35;
    --text:#e6e6e6; --muted:#888; --border:#262626;
    --red:#ff5577; --yellow:#ffcc00;
  }
  html,body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,system-ui,sans-serif;}
  .mono{font-family:'JetBrains Mono','Fira Code','Menlo',monospace;}
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;}
  .panel-2{background:var(--surface2);border:1px solid var(--border);border-radius:10px;}
  .chip{display:inline-flex;align-items:center;gap:6px;padding:2px 8px;border-radius:999px;font-size:11px;border:1px solid var(--border);background:var(--surface2);}
  .accent{color:var(--accent);}
  .scrum{color:var(--scrum);}
  .muted{color:var(--muted);}
  .pulse-dot{display:inline-block;width:8px;height:8px;border-radius:999px;background:var(--scrum);box-shadow:0 0 8px var(--scrum);animation:pulse 1.6s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.45;transform:scale(.8);}}
  .module-link{display:block;padding:8px 10px;border-radius:6px;font-size:13px;color:#bdbdbd;border-left:2px solid transparent;cursor:pointer;}
  .module-link:hover{background:var(--surface2);color:#fff;}
  .module-link.active{background:#1a1428;color:var(--scrum);border-left-color:var(--scrum);}
  .module-link.done::before{content:"✓ ";color:var(--scrum);font-size:11px;}
  .module-link.pending::before{content:"○ ";color:#444;font-size:11px;}
  .block-label{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#666;padding:14px 10px 6px;}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:500;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;transition:all .15s;}
  .btn:hover{background:var(--surface3);border-color:#444;}
  .btn-accent{background:var(--scrum);color:#0d0521;border-color:var(--scrum);}
  .btn-accent:hover{background:#c4a8ff;border-color:#c4a8ff;}
  .btn-ghost{background:transparent;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;background:#1a1428;color:var(--scrum);border:1px solid var(--scrum);padding:10px 18px;border-radius:8px;font-size:13px;transition:all .25s;z-index:50;pointer-events:none;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .badge-basico{background:#003c1a;color:#5fffaa;border:1px solid #00553a;}
  .badge-inter{background:#3c3000;color:#ffcc55;border:1px solid #554a00;}
  .badge-avanz{background:#3c0010;color:#ff7799;border:1px solid #551122;}
  .team-hw{background:#3a1c08;color:#ffb074;border:1px solid #5c2d12;}
  .team-sw{background:#082548;color:#7bb5ff;border:1px solid #1d3a6b;}
  .team-com{background:#3a1a08;color:#ff9b6b;border:1px solid #5c2d18;}
  .team-scrum{background:#1f1a3a;color:#b9a3ff;border:1px solid #36306b;}
  .prio-high{background:#3c0010;color:#ff7799;border:1px solid #551122;}
  .prio-med{background:#3c3000;color:#ffcc55;border:1px solid #554a00;}
  .prio-low{background:#0a2a18;color:#5fffaa;border:1px solid #1d5c3a;}
  details > summary{cursor:pointer;list-style:none;}
  details > summary::-webkit-details-marker{display:none;}
  details[open] .accordion-arrow{transform:rotate(90deg);}
  .accordion-arrow{transition:transform .2s;display:inline-block;}
  .progress-bar{height:4px;background:#1a1a1a;border-radius:999px;overflow:hidden;}
  .progress-bar > div{height:100%;background:linear-gradient(90deg,var(--scrum),var(--accent));transition:width .4s;}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-track{background:#0a0a0a;}
  ::-webkit-scrollbar-thumb{background:#222;border-radius:4px;}
  ::-webkit-scrollbar-thumb:hover{background:#333;}
  .quiz-opt{padding:10px 14px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);cursor:pointer;display:flex;gap:10px;align-items:flex-start;transition:all .15s;}
  .quiz-opt:hover{background:var(--surface3);border-color:#444;}
  .quiz-opt.correct{background:#062b1a;border-color:var(--accent);color:#aaffd0;}
  .quiz-opt.wrong{background:#2b0b15;border-color:var(--red);color:#ffaabb;}
  .quiz-opt.disabled{cursor:default;}
  .fade-in{animation:fadeIn .4s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  .scrum-logo{
    width:24px;height:24px;border-radius:6px;background:linear-gradient(135deg,#c4a8ff,#7c52ff);
    display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;font-weight:700;
  }
  .timer-big{font-family:'JetBrains Mono',monospace;font-size:72px;font-weight:700;}
  .light-green{display:inline-block;width:14px;height:14px;border-radius:50%;background:#5fffaa;box-shadow:0 0 12px #5fffaa;}
  .light-yellow{display:inline-block;width:14px;height:14px;border-radius:50%;background:#ffcc55;box-shadow:0 0 12px #ffcc55;}
  .light-red{display:inline-block;width:14px;height:14px;border-radius:50%;background:#ff5577;box-shadow:0 0 12px #ff5577;}
  .kbn-card{background:#0a0a0a;border:1px solid var(--border);border-radius:8px;padding:10px;cursor:grab;font-size:12px;transition:all .15s;position:relative;}
  .kbn-card:hover{border-color:#444;}
  .kbn-card.dragging{opacity:.4;cursor:grabbing;}
  .kanban-drop.drag-over{background:#1a1428;outline:1px dashed var(--scrum);outline-offset:-4px;border-radius:6px;}
  .kbn-card.blocked{border-color:#551122;}
  .kbn-card .who{font-size:10px;color:#888;margin-top:6px;font-family:monospace;}
  .kbn-card.team-hw-card{border-left:3px solid var(--hw);}
  .kbn-card.team-sw-card{border-left:3px solid var(--sw);}
  .kbn-card.team-com-card{border-left:3px solid var(--com);}
  .pp-card{
    background:linear-gradient(180deg,#1a1428,#0d0820);
    border:1px solid var(--scrum); border-radius:8px;
    width:80px;height:120px;display:flex;align-items:center;justify-content:center;
    font-family:'JetBrains Mono',monospace;font-size:38px;font-weight:800;
    color:var(--scrum);cursor:pointer;transition:all .15s;
  }
  .pp-card:hover{transform:translateY(-6px);box-shadow:0 12px 24px -10px var(--scrum);}
  .pp-card.selected{background:var(--scrum);color:#0d0521;transform:translateY(-6px);}
  .retro-card{
    background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px;font-size:12px;
    display:flex;justify-content:space-between;gap:6px;align-items:center;
  }
  .retro-col{min-height:200px;background:var(--surface2);border-radius:8px;padding:10px;border-top:3px solid;}
  .vote-btn{background:#222;border:1px solid #333;border-radius:4px;padding:1px 6px;font-size:10px;cursor:pointer;color:#aaa;}
  .vote-btn:hover{border-color:var(--scrum);color:var(--scrum);}
  .vote-btn.voted{background:var(--scrum);color:#0d0521;border-color:var(--scrum);}
  table.bk{width:100%;border-collapse:collapse;font-size:12px;}
  table.bk th, table.bk td{border:1px solid #2a2a2a;padding:6px 8px;text-align:left;vertical-align:top;}
  table.bk th{background:#1a1a1a;color:var(--scrum);font-size:10px;text-transform:uppercase;letter-spacing:.05em;}
</style>
</head>
<body class="min-h-screen">

<!-- Sticky banner -->
<div class="sticky top-0 z-40 border-b border-[var(--border)]" style="background:linear-gradient(90deg,#1a1428,#0a0a0a);">
  <div class="px-6 py-2.5 flex items-center justify-between text-sm">
    <div class="flex items-center gap-3">
      <span class="pulse-dot"></span>
      <span class="mono scrum">⚙️ Team Scrum</span>
      <span class="muted">— el equipo que hace que todo funcione. Sin código, sin cables: facilitamos.</span>
    </div>
    <div class="flex items-center gap-4 text-xs muted">
      <span id="proj-light" class="flex items-center gap-2"><span class="light-green"></span> Semáforo: cargando...</span>
      <span class="chip mono" style="border-color:#36306b;color:#b9a3ff;">v1.0</span>
    </div>
  </div>
</div>

<!-- Layout -->
<div class="flex" style="min-height:calc(100vh - 41px);">

  <!-- SIDEBAR -->
  <aside id="sidebar" class="border-r border-[var(--border)] flex-shrink-0 flex flex-col" style="width:300px;background:#080808;">
    <div class="p-5 border-b border-[var(--border)]">
      <div class="flex items-center gap-3 mb-1">
        <div class="scrum-logo">⚙</div>
        <div>
          <div class="text-sm font-semibold">Arduino desde Cero</div>
          <div class="text-[11px] scrum mono">Scrum · Coordinación · Métricas</div>
        </div>
      </div>
      <div class="mt-4">
        <div class="flex justify-between text-[11px] muted mb-1.5">
          <span>Progreso total</span>
          <span><span id="progress-num">0</span>/<span id="progress-tot">18</span></span>
        </div>
        <div class="progress-bar"><div id="progress-fill" style="width:0%"></div></div>
      </div>
      <!-- Project status panel -->
      <div class="panel-2 p-3 mt-4">
        <div class="text-[10px] muted mono mb-2">SEMÁFORO DEL PROYECTO</div>
        <div id="proj-status" class="flex items-center gap-2"></div>
        <div id="proj-status-msg" class="text-[11px] muted mt-2"></div>
      </div>
    </div>

    <nav id="module-nav" class="flex-1 overflow-y-auto py-2"></nav>

    <div class="p-3 border-t border-[var(--border)] space-y-2">
      <button onclick="openReport()" class="btn w-full justify-center">
        📊 Reporte general
      </button>
      <button onclick="resetProgress()" class="btn btn-ghost w-full justify-center text-[11px] muted">Reiniciar progreso</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main id="main" class="flex-1 overflow-x-hidden">
    <div id="module-content" class="max-w-[1100px] mx-auto px-10 py-10 fade-in"></div>

    <div class="max-w-[1100px] mx-auto px-10 pb-16 flex items-center justify-between">
      <button id="prev-btn" class="btn">← Anterior</button>
      <button id="mark-done" class="btn btn-accent">Marcar como completado ✓</button>
      <button id="next-btn" class="btn">Siguiente →</button>
    </div>
  </main>
</div>

<!-- Story modal (Sprintboard) -->
<div id="story-modal" class="fixed inset-0 z-50 hidden items-center justify-center" style="background:rgba(0,0,0,.7);">
  <div class="panel-2 p-5 w-[480px] max-w-[95vw]">
    <div class="flex justify-between items-start mb-3">
      <div class="text-xs muted">Tarea</div>
      <button onclick="closeStoryModal()" class="btn">✕</button>
    </div>
    <div id="story-modal-body"></div>
  </div>
</div>

<!-- Report modal -->
<div id="report-modal" class="fixed inset-0 z-50 hidden items-center justify-center" style="background:rgba(0,0,0,.8);">
  <div class="panel-2 w-[760px] max-w-[95vw] max-h-[90vh] overflow-y-auto p-6">
    <div class="flex justify-between items-start mb-4">
      <h2 class="text-lg font-semibold">📊 Reporte del proyecto</h2>
      <div class="flex gap-2">
        <button onclick="copyReport()" class="btn">📋 Copiar</button>
        <button onclick="closeReport()" class="btn">✕</button>
      </div>
    </div>
    <pre id="report-content" class="mono text-xs whitespace-pre-wrap bg-[var(--bg)] p-4 rounded border border-[var(--border)]" style="line-height:1.7;"></pre>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast">Copiado</div>

<!-- =========================================================== -->
<script>
const BLOCKS = [
  { id:'b1', title:'Bloque 1 · Scrum desde cero' },
  { id:'b2', title:'Bloque 2 · Rituales del proyecto' },
  { id:'b3', title:'Bloque 3 · Sprintboard y coordinación' },
  { id:'b4', title:'Bloque 4 · Herramientas y plus' },
];
const MODULES = [
  { id:'m1.1', block:'b1', num:'1.1', title:'¿Qué es Scrum y para qué sirve acá?', level:'basico' },
  { id:'m1.2', block:'b1', num:'1.2', title:'Los roles del proyecto (versión escolar)', level:'basico' },
  { id:'m1.3', block:'b1', num:'1.3', title:'El Backlog del proyecto', level:'basico' },
  { id:'m1.4', block:'b1', num:'1.4', title:'Autoevaluación Bloque 1', level:'basico' },

  { id:'m2.1', block:'b2', num:'2.1', title:'El Sprint: la semana de trabajo', level:'inter' },
  { id:'m2.2', block:'b2', num:'2.2', title:'Daily Standup: el ritual diario', level:'inter' },
  { id:'m2.3', block:'b2', num:'2.3', title:'Sprint Planning: planificar la semana', level:'inter' },
  { id:'m2.4', block:'b2', num:'2.4', title:'Sprint Review + Retrospectiva', level:'inter' },
  { id:'m2.5', block:'b2', num:'2.5', title:'Gestión de bloqueos', level:'inter' },

  { id:'m3.1', block:'b3', num:'3.1', title:'El Sprintboard: el corazón del proyecto', level:'avanz' },
  { id:'m3.2', block:'b3', num:'3.2', title:'Burndown Chart: ¿vamos bien?', level:'avanz' },
  { id:'m3.3', block:'b3', num:'3.3', title:'Dependencias entre teams', level:'avanz' },
  { id:'m3.4', block:'b3', num:'3.4', title:'Normas de comunicación', level:'inter' },
  { id:'m3.5', block:'b3', num:'3.5', title:'Métricas del proyecto', level:'avanz' },
  { id:'m3.6', block:'b3', num:'3.6', title:'Final + Entregables del team', level:'avanz' },

  { id:'m4.1', block:'b4', num:'4.1', title:'Herramientas Agile gratuitas', level:'basico' },
  { id:'m4.2', block:'b4', num:'4.2', title:'Planning Poker: estimar como equipo', level:'inter' },
  { id:'m4.3', block:'b4', num:'4.3', title:'Glosario Scrum (cheatsheet)', level:'basico' },
];

const STATE = {
  current: 'm1.1',
  done: JSON.parse(localStorage.getItem('scrum_done')||'{}'),
  notes: JSON.parse(localStorage.getItem('scrum_notes')||'{}'),
  quiz:  JSON.parse(localStorage.getItem('scrum_quiz')||'{}'),
  checks: JSON.parse(localStorage.getItem('scrum_checks')||'{}'),
  fields: JSON.parse(localStorage.getItem('scrum_fields')||'{}'),
  board: JSON.parse(localStorage.getItem('scrum_board')||'null'),
  dailies: JSON.parse(localStorage.getItem('scrum_dailies')||'[]'),
  retros: JSON.parse(localStorage.getItem('scrum_retros')||'{}'),
  blocks: JSON.parse(localStorage.getItem('scrum_blocks')||'[]'),
  deps:   JSON.parse(localStorage.getItem('scrum_deps')||'null'),
};

function saveState(){
  localStorage.setItem('scrum_done', JSON.stringify(STATE.done));
  localStorage.setItem('scrum_notes', JSON.stringify(STATE.notes));
  localStorage.setItem('scrum_quiz', JSON.stringify(STATE.quiz));
  localStorage.setItem('scrum_checks', JSON.stringify(STATE.checks));
  localStorage.setItem('scrum_fields', JSON.stringify(STATE.fields));
  localStorage.setItem('scrum_board', JSON.stringify(STATE.board));
  localStorage.setItem('scrum_dailies', JSON.stringify(STATE.dailies));
  localStorage.setItem('scrum_retros', JSON.stringify(STATE.retros));
  localStorage.setItem('scrum_blocks', JSON.stringify(STATE.blocks));
  localStorage.setItem('scrum_deps', JSON.stringify(STATE.deps));
  updateProjectLight();
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),1800);
}
async function copyText(text){
  try{ await navigator.clipboard.writeText(text); toast('📋 Copiado'); }
  catch{ toast('No se pudo copiar'); }
}
function badge(level){
  if(level==='basico') return `<span class="chip badge-basico">🟢 Básico</span>`;
  if(level==='inter')  return `<span class="chip badge-inter">🟡 Intermedio</span>`;
  return `<span class="chip badge-avanz">🔴 Avanzado</span>`;
}
function setField(id, val){ STATE.fields[id]=val; saveState(); }
function getField(id, def=''){ return STATE.fields[id] ?? def; }
function setCheck(id, val){ STATE.checks[id]=val; saveState(); }
function getCheck(id){ return !!STATE.checks[id]; }

document.getElementById('progress-tot').textContent = MODULES.length;

function renderSidebar(){
  const nav=document.getElementById('module-nav');
  let html='';
  for(const b of BLOCKS){
    html += `<div class="block-label">${b.title}</div>`;
    for(const m of MODULES.filter(x=>x.block===b.id)){
      const cls = m.id===STATE.current ? 'active' : '';
      const done = STATE.done[m.id] ? 'done' : 'pending';
      html += `<div class="module-link ${cls} ${done}" onclick="goTo('${m.id}')">
        <div class="flex items-center justify-between">
          <span><span class="mono muted">${m.num}</span>  ${m.title}</span>
        </div>
      </div>`;
    }
  }
  nav.innerHTML=html;
  const doneCount = Object.values(STATE.done).filter(Boolean).length;
  document.getElementById('progress-num').textContent = doneCount;
  document.getElementById('progress-fill').style.width = ((doneCount/MODULES.length)*100).toFixed(1)+'%';
}
function goTo(id){ STATE.current=id; renderSidebar(); renderModule(id); document.getElementById('main').scrollTo({top:0,behavior:'smooth'}); }
function nextModule(){ const idx=MODULES.findIndex(m=>m.id===STATE.current); if(idx<MODULES.length-1) goTo(MODULES[idx+1].id); }
function prevModule(){ const idx=MODULES.findIndex(m=>m.id===STATE.current); if(idx>0) goTo(MODULES[idx-1].id); }
function markDone(){ STATE.done[STATE.current]=true; saveState(); renderSidebar(); toast('✓ Módulo completado'); setTimeout(nextModule,500); }
function resetProgress(){
  if(!confirm('¿Reiniciar TODO? (módulos, sprintboard, retros, daily, bloqueos)')) return;
  ['scrum_done','scrum_notes','scrum_quiz','scrum_checks','scrum_fields','scrum_board','scrum_dailies','scrum_retros','scrum_blocks','scrum_deps'].forEach(k=>localStorage.removeItem(k));
  location.reload();
}

document.addEventListener('DOMContentLoaded', ()=>{
  document.getElementById('next-btn').onclick=nextModule;
  document.getElementById('prev-btn').onclick=prevModule;
  document.getElementById('mark-done').onclick=markDone;
  ensureBoard();
  ensureDeps();
  renderSidebar();
  renderModule(STATE.current);
  updateProjectLight();
});

function moduleHeader(m){
  const blockTitle = BLOCKS.find(b=>b.id===m.block).title.split('·')[1].trim();
  return `
    <div class="flex items-center justify-between mb-2">
      <div class="text-xs mono muted">Módulo ${m.num} · ${blockTitle}</div>
      ${badge(m.level)}
    </div>
    <h1 class="text-3xl font-semibold mb-1 tracking-tight">${m.title}</h1>
    <div class="h-px bg-[var(--border)] my-6"></div>`;
}
function notesPanel(id){
  const val=(STATE.notes[id]||'').replace(/</g,'&lt;');
  return `
    <div class="panel p-4 mt-8">
      <div class="flex items-center gap-2 mb-2">
        <span class="text-sm">📝 Mis notas</span>
        <span class="text-[10px] muted">(autoguardado)</span>
      </div>
      <textarea oninput="STATE.notes['${id}']=this.value;saveState();" placeholder="Notas sobre este módulo..."
        class="w-full bg-[var(--surface2)] border border-[var(--border)] rounded p-3 text-sm font-mono"
        style="min-height:80px;resize:vertical;">${val}</textarea>
    </div>`;
}
function renderModule(id){
  const m=MODULES.find(x=>x.id===id);
  if(!m) return;
  const out=document.getElementById('module-content');
  out.classList.remove('fade-in'); void out.offsetWidth; out.classList.add('fade-in');
  out.innerHTML = MOD_BODY[id](m) + notesPanel(id);
  if(MOD_AFTER[id]) MOD_AFTER[id]();
}

const MOD_BODY={}; const MOD_AFTER={};

function teamBadge(t){
  const map = {hw:['Hardware','team-hw','🔧'], sw:['Software','team-sw','💻'], com:['Comunicación','team-com','🎪'], scrum:['Scrum','team-scrum','⚙️']};
  const [n,c,e] = map[t] || ['?','chip',''];
  return `<span class="chip ${c}">${e} ${n}</span>`;
}
function prioBadge(p){
  return `<span class="chip prio-${p==='alta'?'high':p==='media'?'med':'low'}">${p==='alta'?'🔴':p==='media'?'🟡':'🟢'} ${p}</span>`;
}

/* ====== Pre-loaded backlog (stories from all 3 teams) ====== */
const DEFAULT_STORIES = [
  // HARDWARE
  {id:'h1', team:'hw', sprint:1, prio:'alta', title:'Identificar componentes y armar lista de materiales',
    crit:'Lista impresa con cantidades, todo en una caja del laboratorio', col:'todo', who:'', estim:3, blocked:false},
  {id:'h2', team:'hw', sprint:1, prio:'alta', title:'Conectar sensor de humedad al Arduino',
    crit:'Sensor da lecturas estables entre 0-1023 en el Serial Monitor', col:'todo', who:'', estim:5, blocked:false},
  {id:'h3', team:'hw', sprint:2, prio:'alta', title:'Conectar módulo relé + bomba',
    crit:'Bomba se enciende y apaga desde el Arduino con un blink test', col:'todo', who:'', estim:5, blocked:false},
  {id:'h4', team:'hw', sprint:2, prio:'alta', title:'Integrar sensor + relé + bomba en sketch único',

function updateProjectLight(){
  // Simple status logic
  const total = (STATE.board||[]).length || 1;
  const done = (STATE.board||[]).filter(s=>s.col==='done').length;
  const activeBlocks = (STATE.blocks||[]).filter(b=>b.status==='active').length;
  const blockedStories = (STATE.board||[]).filter(s=>s.blocked).length;
  let color='green', msg='Todo en orden';
  if(activeBlocks >= 3 || blockedStories >= 3){ color='red'; msg='⚠️ Muchos bloqueos — revisar Retro'; }
  else if(activeBlocks >= 1 || blockedStories >= 1){ color='yellow'; msg='Atención: hay bloqueos'; }
  const lights = {green:'light-green',yellow:'light-yellow',red:'light-red'};
  const labels = {green:'🟢 Verde',yellow:'🟡 Amarillo',red:'🔴 Rojo'};
  const headEl = document.getElementById('proj-light');
  if(headEl) headEl.innerHTML = `<span class="${lights[color]}"></span> Semáforo: <strong>${labels[color]}</strong>`;
  const sEl = document.getElementById('proj-status');
  if(sEl) sEl.innerHTML = `<span class="${lights[color]}"></span> <strong>${labels[color]}</strong>`;
  const mEl = document.getElementById('proj-status-msg');
  if(mEl) mEl.textContent = `${done}/${total} tareas hechas · ${activeBlocks} bloqueos activos`;
}

let DAILY_INT=null, DAILY_SEC=900, DAILY_PAUSED=true;
function startDailyTimer(){ if(!DAILY_INT){ DAILY_PAUSED=false; DAILY_INT=setInterval(tickDaily,1000); } document.getElementById('daily-timer-status').textContent='Corriendo'; }
function pauseDailyTimer(){ DAILY_PAUSED=!DAILY_PAUSED; document.getElementById('daily-timer-status').textContent = DAILY_PAUSED?'Pausado':'Corriendo'; }
function resetDailyTimer(){ DAILY_SEC=900; clearInterval(DAILY_INT); DAILY_INT=null; const t=document.getElementById('daily-timer'); if(t){t.textContent='15:00';t.style.color='var(--scrum)';} const s=document.getElementById('daily-timer-status'); if(s)s.textContent='Esperando'; }
function tickDaily(){
  if(DAILY_PAUSED) return;
  DAILY_SEC--;
  const m=Math.floor(DAILY_SEC/60), s=DAILY_SEC%60;
  const t=document.getElementById('daily-timer'); if(!t){clearInterval(DAILY_INT);DAILY_INT=null;return;}
  t.textContent=m+':'+String(s).padStart(2,'0');
  if(DAILY_SEC<=60) t.style.color='var(--red)';
  else if(DAILY_SEC<=180) t.style.color='var(--yellow)';
  else t.style.color='var(--scrum)';
  if(DAILY_SEC===180) toast('⏰ Quedan 3 minutos');
  if(DAILY_SEC===60) toast('⏰ Queda 1 minuto');
  if(DAILY_SEC<=0){ clearInterval(DAILY_INT); DAILY_INT=null; document.getElementById('daily-timer-status').textContent='¡Tiempo!'; toast('⏰ Se acabó el Daily'); }
}
function saveDaily(){
  const name = document.getElementById('d-name').value.trim();

  const today = document.getElementById('d-today').value.trim();

  STATE.dailies.push({name,team,done,today,block,ts});
  saveState(); toast('✓ Daily registrado'); renderModule(STATE.current);
}

}

MOD_AFTER['m3.2'] = () => renderBurndown();
let burndownChart=null;
function renderBurndown(){
  const sp = +(document.getElementById('bd-sprint')?.value || 1);
  const stories = STATE.board.filter(s=>s.sprint===sp);
  const totalPts = stories.reduce((a,b)=>a+b.estim,0);
  const donePts = stories.filter(s=>s.col==='done').reduce((a,b)=>a+b.estim,0);
  const leftPts = totalPts - donePts;
  document.getElementById('bd-total').textContent = totalPts;
  document.getElementById('bd-done').textContent = donePts;
  document.getElementById('bd-left').textContent = leftPts;

  // Ideal: linear decrease over 7 days; Real: simulated based on done so far
  const days = 7;
  const ideal = []; for(let i=0;i<=days;i++) ideal.push(totalPts*(1 - i/days));
  // Real: linear interpolation from totalPts to leftPts split based on days passed (simulated)
  const passed = Math.min(days, Math.ceil((donePts/totalPts)*days)) || 0;
  const real = []; for(let i=0;i<=days;i++){
    if(i<=passed) real.push(totalPts - (donePts*i/Math.max(1,passed)));
    else real.push(null);
  }

  const ctx = document.getElementById('burndown-canvas').getContext('2d');
  if(burndownChart) burndownChart.destroy();
  burndownChart = new Chart(ctx, {
    type:'line',
    data:{
      labels:['Lun','Mar','Mié','Jue','Vie','Sáb','Dom','Lun'],
      datasets:[
        {label:'Ideal', data:ideal, borderColor:'#a78bfa', backgroundColor:'#a78bfa22', borderDash:[6,4], pointRadius:0, tension:0},
        {label:'Real',  data:real,  borderColor:'#00ff88', backgroundColor:'#00ff8822', pointRadius:5, pointBackgroundColor:'#00ff88', tension:.1},
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#aaa'}}, tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.y?.toFixed(1)||'-'} pts`}}},
      scales:{
        y:{beginAtZero:true, ticks:{color:'#888'}, grid:{color:'#222'}, title:{display:true,text:'Puntos restantes',color:'#888'}},
        x:{ticks:{color:'#888'}, grid:{color:'#222'}},
      }
    }
  });

  // Interpretation
  const interp = document.getElementById('bd-interp');
  const ratio = totalPts? donePts/totalPts : 0;
  const expectedRatio = passed/days;
  let msg, color;
  if(totalPts===0){ msg='Este Sprint todavía no tiene historias. Cargá tareas al planning.'; color='#888'; }
  else if(ratio >= expectedRatio*1.1){ msg='🟢 <strong>Excelente ritmo.</strong> Vas adelantado. Considerá tomar 1-2 historias extra del Backlog.'; color='#5fffaa'; }
  else if(ratio >= expectedRatio*0.7){ msg='🟡 <strong>Ritmo aceptable.</strong> Estás en línea con el plan ideal. Mantenelo.'; color='#ffcc55'; }
  else{ msg='🔴 <strong>Ritmo bajo.</strong> Hay riesgo de no terminar el Sprint. Revisar bloqueos en la próxima Retro. ¿Hay alguien sobrecargado?'; color='#ff7788'; }
  interp.innerHTML = `<div style="color:${color};font-size:14px;">${msg}</div>`;
  interp.style.borderColor = color;
}

function renderMetrics(){
  // Velocity: puntos done por sprint
  const velData = [1,2,3,4].map(sp=>{
    const ss = STATE.board.filter(s=>s.sprint===sp && s.col==='done');
    return ss.reduce((a,b)=>a+b.estim,0);
  });
  const vctx = document.getElementById('chart-velocity')?.getContext('2d');
  if(vctx){
    if(window._vChart) window._vChart.destroy();
    window._vChart = new Chart(vctx,{
      type:'bar',
      data:{ labels:['S1','S2','S3','S4'], datasets:[{label:'Puntos completados', data:velData, backgroundColor:['#a78bfa','#a78bfa','#a78bfa','#a78bfa']}] },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{color:'#888'},grid:{color:'#222'}},x:{ticks:{color:'#888'},grid:{display:false}}}}
    });
  }
  // Distribution: stories por team
  const distData = ['hw','sw','com'].map(t=>STATE.board.filter(s=>s.team===t).length);
  const dctx = document.getElementById('chart-dist')?.getContext('2d');
  if(dctx){
    if(window._dChart) window._dChart.destroy();
    window._dChart = new Chart(dctx,{
      type:'doughnut',
      data:{labels:['🔧 Hardware','💻 Software','🎪 Comunicación'], datasets:[{data:distData, backgroundColor:['#f97316','#3b82f6','#ff6b35']}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#aaa',font:{size:10}}}}}
    });
  }
  // Blocks: activos vs resueltos
  const bData = ['active','resolving','resolved'].map(s=>STATE.blocks.filter(b=>b.status===s).length);
  const bctx = document.getElementById('chart-blocks')?.getContext('2d');
  if(bctx){
    if(window._bChart) window._bChart.destroy();
    window._bChart = new Chart(bctx,{
      type:'bar',
      data:{labels:['Activos','En resolución','Resueltos'], datasets:[{data:bData, backgroundColor:['#ff5577','#ffcc55','#5fffaa']}]},
      options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{color:'#888'},grid:{display:false}},x:{ticks:{color:'#888'},grid:{color:'#222'}}}}
    });
  }
  // Debt: stories que no están en done y sprint pasó. Approx: sum of estim of stories in todo/doing of past sprints.
  const debt = STATE.board.filter(s=>s.col!=='done').reduce((a,b)=>a+b.estim,0);
  const debtEl = document.getElementById('debt-meter');
  if(debtEl){
    const max = STATE.board.reduce((a,b)=>a+b.estim,0)||1;
    const pct = Math.min(100, Math.round(debt/max*100));
    const color = pct>70?'#ff7788':pct>40?'#ffcc55':'#5fffaa';
    debtEl.innerHTML = `
      <div class="text-3xl mono mt-2" style="color:${color}">${debt} pts</div>
      <div class="text-[11px] muted mb-2">total pendiente</div>
      <div class="progress-bar"><div style="width:${pct}%;background:${color}"></div></div>
      <div class="text-[11px] muted mt-2">${pct<40?'🟢 Manejable':pct<70?'🟡 Vigilarlo':'🔴 Riesgo de no llegar'}</div>
    `;
  }
  // Big semáforo
  const activeBlocks = STATE.blocks.filter(b=>b.status==='active').length;
  const blockedStories = STATE.board.filter(s=>s.blocked).length;
  let color, label, msg;
  if(activeBlocks >= 3 || blockedStories >= 3){ color='light-red'; label='🔴 Rojo'; msg='Hay muchos bloqueos activos. Convocá retro extra.'; }
  else if(activeBlocks >= 1 || blockedStories >= 1){ color='light-yellow'; label='🟡 Amarillo'; msg='Atención: hay bloqueos. Asegurate de gestionarlos esta semana.'; }
  else{ color='light-green'; label='🟢 Verde'; msg='El proyecto está en buen estado. Mantené el ritmo.'; }
  const bl = document.getElementById('big-light'); if(bl) bl.innerHTML = `<span class="${color}" style="width:30px;height:30px;"></span> <strong>${label}</strong>`;
  const blm = document.getElementById('big-light-msg'); if(blm) blm.textContent = msg;
}

function openReport(){
  const m = document.getElementById('report-modal');
  m.classList.remove('hidden'); m.classList.add('flex');
  const teams = {hw:'Hardware', sw:'Software', com:'Comunicación', scrum:'Scrum'};
  let r = `REPORTE GENERAL DEL PROYECTO\n${'═'.repeat(60)}\nFecha: ${new Date().toLocaleString('es-AR')}\n\n`;
  r += `📋 BACKLOG\n  Total: ${STATE.board.length} historias\n  ${['todo','doing','review','done'].map(c=>`${{todo:'Por hacer',doing:'En progreso',review:'En revisión',done:'Hecho'}[c]}: ${STATE.board.filter(s=>s.col===c).length}`).join('\n  ')}\n\n`;
  r += `🏆 POR TEAM\n`;
  for(const t of Object.keys(teams).slice(0,3)){
    const ss = STATE.board.filter(s=>s.team===t);
    const d = ss.filter(s=>s.col==='done').length;
    r += `  ${teams[t]}: ${d}/${ss.length} hist.\n`;
  }
  r += `\n📅 POR SPRINT\n`;
  for(const sp of [1,2,3,4]){
    const ss = STATE.board.filter(s=>s.sprint===sp);
    const pts = ss.reduce((a,b)=>a+b.estim,0);
    const dpts = ss.filter(s=>s.col==='done').reduce((a,b)=>a+b.estim,0);
    r += `  Sprint ${sp}: ${dpts}/${pts} pts\n`;
  }
  r += `\n🚫 BLOQUEOS\n  Total registrados: ${STATE.blocks.length}\n  Activos: ${STATE.blocks.filter(b=>b.status==='active').length}\n  Resueltos: ${STATE.blocks.filter(b=>b.status==='resolved').length}\n`;
  r += `\n☀️ DAILYS REGISTRADOS\n  ${STATE.dailies.length}\n`;
  const retros = Object.keys(STATE.retros).length;
  r += `\n🔄 RETROS REALIZADAS\n  ${retros}\n`;
  r += `\n📦 ENTREGABLES TEAM SCRUM\n  ${SCRUM_DELIVERABLES.map(([id,t])=>`${getCheck(id)?'✅':'⏳'} ${t}`).join('\n  ')}\n`;
  document.getElementById('report-content').textContent = r;
}
function closeReport(){ const m=document.getElementById('report-modal'); m.classList.add('hidden'); m.classList.remove('flex'); }

  return `
${moduleHeader(m)}
<p class="text-base muted mb-6"><strong>Planning Poker</strong> es una técnica para estimar tareas en equipo. Cada uno elige una carta (su estimación) <strong>en privado</strong>, se voltean al mismo tiempo, y se discuten las diferencias. Evita que el primero en hablar influencie al resto.</p>

  <ul class="text-xs muted space-y-1">
    <li><span class="mono accent">1</span> — trivial (cambiar un texto)</li>
    <li><span class="mono accent">3</span> — fácil (1-2 horas)</li>

    }).join('')}

function pokerVote(round, who, card){
  const key='poker_votes_'+round;
  const v = STATE.fields[key] ? JSON.parse(STATE.fields[key]) : {};
  v[who] = card;
  STATE.fields[key] = JSON.stringify(v);
  saveState(); renderModule(STATE.current);
}
function flipPoker(round){
  const me = STATE.fields['poker_votes_'+round] ? JSON.parse(STATE.fields['poker_votes_'+round]).me : null;
  if(!me){ toast('Elegí tu carta primero'); return; }
  // simulate team votes around the typical estimate
  const story = POKER_STORIES[round % POKER_STORIES.length];
  const hint = story.hint.match(/[Tt]ípica\s+(\d+)/);
  const typical = hint ? +hint[1] : 5;
  const variants = [1,2,3,5,8,13];
  const nearby = variants.filter(v=>Math.abs(v-typical)<=Math.max(typical*0.6,2));
  const v = STATE.fields['poker_votes_'+round] ? JSON.parse(STATE.fields['poker_votes_'+round]) : {};
  for(let i=0;i<4;i++){
    if(!v['t'+i]) v['t'+i] = nearby[Math.floor(Math.random()*nearby.length)];
  }
  STATE.fields['poker_votes_'+round] = JSON.stringify(v);
  saveState(); renderModule(STATE.current);
  setTimeout(()=>{
    const all = [+me, ...['t0','t1','t2','t3'].map(k=>+v[k])];
    const min = Math.min(...all), max = Math.max(...all);
    const diff = max-min;
    let msg, color;
    if(diff <= 2){ msg=`🟢 <strong>Consenso!</strong> El equipo está alineado (${all.join(', ')}). Estimación: ${typical} pts.`; color='#5fffaa'; }
    else if(diff <= 5){ msg=`🟡 <strong>Hay diferencias.</strong> Votos: ${all.join(', ')}. Discutan brevemente y vuelvan a votar.`; color='#ffcc55'; }
    else{ msg=`🔴 <strong>Mucho desacuerdo</strong> (votos: ${all.join(', ')}). Probablemente hay un malentendido sobre la historia — alguien ve algo que otros no.`; color='#ff7788'; }
    const r = document.getElementById('poker-result');
    if(r) r.innerHTML = `<div class="panel-2 p-4" style="border-color:${color};color:${color}">${msg}</div>`;
  },200);
}
function nextRound(){ STATE.fields.poker_round = (STATE.fields.poker_round||0)+1; saveState(); renderModule(STATE.current); }
function prevRound(){ STATE.fields.poker_round = Math.max(0,(STATE.fields.poker_round||0)-1); saveState(); renderModule(STATE.current); }

const GLOSSARY = [
  ['Backlog','Lista priorizada de TODO lo que hay que hacer para llegar a la meta. Vive en evolución.'],

  ['Definition of Done (DoD)','Lista de criterios que define cuándo una historia está "terminada" para todo el equipo.'],
  ['Definition of Ready (DoR)','Criterios para que una historia pueda entrar al Sprint (tiene criterio, está estimada, etc.).'],
  ['Dependencia','Cuando un team no puede terminar su tarea hasta que otro entregue algo.'],
  ['Épica','Una "súper-historia" muy grande que agrupa varias historias relacionadas.'],
  ['Estimación','Asignarle un tamaño a una historia. En story points: 1, 2, 3, 5, 8, 13...'],
  ['Historia de Usuario','Una unidad de trabajo escrita desde la perspectiva del usuario. Formato típico: "Como [rol] quiero [acción] para [beneficio]".'],
  ['Impediment / Bloqueo','Algo que impide que una tarea avance y la persona no puede resolver sola.'],
  ['Incremento','Lo que se entrega al final de cada Sprint. Funciona — no es "casi terminado".'],
  ['Kanban','Sistema de tarjetas que se mueven entre columnas (To Do → In Progress → Done). Sprintboard usa Kanban.'],
  ['MVP (Minimum Viable Product)','La versión más simple que ya funciona y aporta valor. <em>"¿Qué es lo mínimo para que sirva?"</em>'],
  ['Planning Poker','Técnica de estimación en equipo con cartas Fibonacci, en privado, simultáneo.'],
  ['Producto','Lo que se construye. Acá: el sistema de riego funcionando + presentación.'],
  ['Product Owner','En la industria: quien define el "qué" y prioriza. Acá: la feria + el docente.'],
  ['Retrospectiva (Retro)','Reunión al final del Sprint para mejorar el proceso: ¿qué cambiamos para la próxima?'],
  ['Refinamiento (grooming)','Actualizar y aclarar historias del Backlog antes de que entren al Sprint.'],
  ['Scrum','Marco de trabajo ágil basado en sprints cortos y rituales.'],
  ['Scrum Master','Persona/team que facilita el proceso. Servant leader.'],
  ['Servant Leader','Líder que sirve al equipo, no al revés. Quita obstáculos, no manda.'],
  ['Sprint','Período fijo de trabajo. Acá: una semana.'],
  ['Sprint Backlog','Las historias del Backlog que el equipo se comprometió a hacer en este Sprint.'],
  ['Sprint Planning','Reunión al inicio del Sprint para decidir qué hacer esta semana.'],
  ['Sprint Review','Reunión al final del Sprint para mostrar lo terminado. Demo en vivo.'],
  ['Sprintboard','El tablero Kanban del Sprint. La verdad operativa del equipo.'],
  ['Stand-up','Sinónimo de Daily. Se llama así porque se hace de pie (para no extenderse).'],
  ['Story Points','Unidad de estimación, no de tiempo. Refleja complejidad + incertidumbre + esfuerzo.'],
  ['Timebox','Tiempo fijo asignado a una reunión o tarea. Se respeta a rajatabla.'],
  ['Velocidad','Cuántos story points completa el equipo por Sprint. Sirve para planificar.'],
];
