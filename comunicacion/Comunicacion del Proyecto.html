<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Arduino desde Cero · Comunicación del Proyecto</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{
    --bg:#0a0a0a; --surface:#111111; --surface2:#1a1a1a; --surface3:#222222;
    --accent:#00ff88;          /* verde de la serie */
    --com:#ff6b35;             /* naranja del team comunicación */
    --com-dim:#ff6b3522;
    --blue:#3b82f6;
    --text:#e6e6e6; --muted:#888888; --border:#262626;
    --red:#ff5577; --yellow:#ffcc00;
  }
  html,body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,system-ui,sans-serif;}
  .mono{font-family:'JetBrains Mono','Fira Code','Menlo',monospace;}
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;}
  .panel-2{background:var(--surface2);border:1px solid var(--border);border-radius:10px;}
  .chip{display:inline-flex;align-items:center;gap:6px;padding:2px 8px;border-radius:999px;font-size:11px;border:1px solid var(--border);background:var(--surface2);}
  .accent{color:var(--accent);}
  .com{color:var(--com);}
  .muted{color:var(--muted);}
  .pulse-dot{display:inline-block;width:8px;height:8px;border-radius:999px;background:var(--com);box-shadow:0 0 8px var(--com);animation:pulse 1.6s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.45;transform:scale(.8);}}
  .module-link{display:block;padding:8px 10px;border-radius:6px;font-size:13px;color:#bdbdbd;border-left:2px solid transparent;cursor:pointer;}
  .module-link:hover{background:var(--surface2);color:#fff;}
  .module-link.active{background:#2a1208;color:var(--com);border-left-color:var(--com);}
  .module-link.done::before{content:"✓ ";color:var(--com);font-size:11px;}
  .module-link.pending::before{content:"○ ";color:#444;font-size:11px;}
  .block-label{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#666;padding:14px 10px 6px;}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:500;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;transition:all .15s;}
  .btn:hover{background:var(--surface3);border-color:#444;}
  .btn-accent{background:var(--com);color:#1a0a00;border-color:var(--com);}
  .btn-accent:hover{background:#ff8855;border-color:#ff8855;}
  .btn-green{background:var(--accent);color:#001a0d;border-color:var(--accent);}
  .btn-ghost{background:transparent;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;background:#2a1208;color:var(--com);border:1px solid var(--com);padding:10px 18px;border-radius:8px;font-size:13px;transition:all .25s;z-index:50;pointer-events:none;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .badge-basico{background:#003c1a;color:#5fffaa;border:1px solid #00553a;}
  .badge-inter{background:#3c3000;color:#ffcc55;border:1px solid #554a00;}
  .badge-avanz{background:#3c0010;color:#ff7799;border:1px solid #551122;}
  .badge-imp{background:#2a1208;color:#ff8855;border:1px solid #553318;}
  .badge-film{background:#08172a;color:#5cc0ff;border:1px solid #1d3a5c;}
  .badge-design{background:#1a0a2a;color:#c79bff;border:1px solid #3a1d5c;}
  .badge-stand{background:#0a2a18;color:#5fffaa;border:1px solid #1d5c3a;}
  .kbd{font-family:'JetBrains Mono',monospace;background:#222;border:1px solid #333;border-bottom-width:2px;padding:1px 6px;border-radius:4px;font-size:11px;color:#ddd;}
  details > summary{cursor:pointer;list-style:none;}
  details > summary::-webkit-details-marker{display:none;}
  details[open] .accordion-arrow{transform:rotate(90deg);}
  .accordion-arrow{transition:transform .2s;display:inline-block;}
  .progress-bar{height:4px;background:#1a1a1a;border-radius:999px;overflow:hidden;}
  .progress-bar > div{height:100%;background:linear-gradient(90deg,var(--com),var(--accent));transition:width .4s;}
  .copy-btn{position:absolute;top:8px;right:8px;font-size:11px;padding:4px 10px;background:#1a1a1a;border:1px solid #333;border-radius:6px;color:#aaa;cursor:pointer;z-index:5;}
  .copy-btn:hover{color:var(--com);border-color:var(--com);}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-track{background:#0a0a0a;}
  ::-webkit-scrollbar-thumb{background:#222;border-radius:4px;}
  ::-webkit-scrollbar-thumb:hover{background:#333;}
  .quiz-opt{padding:10px 14px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);cursor:pointer;display:flex;gap:10px;align-items:flex-start;transition:all .15s;}
  .quiz-opt:hover{background:var(--surface3);border-color:#444;}
  .quiz-opt.correct{background:#062b1a;border-color:var(--accent);color:#aaffd0;}
  .quiz-opt.wrong{background:#2b0b15;border-color:var(--red);color:#ffaabb;}
  .quiz-opt.disabled{cursor:default;}
  .fade-in{animation:fadeIn .4s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  .com-logo{
    width:24px;height:24px;border-radius:6px;background:linear-gradient(135deg,#ff8855,#ff3300);
    display:flex;align-items:center;justify-content:center;font-size:13px;
  }
  .swatch{height:80px;border-radius:8px;display:flex;align-items:flex-end;padding:8px;color:#000;font-family:monospace;font-size:11px;font-weight:600;cursor:pointer;}
  .icon-card{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .15s;}
  .icon-card:hover{border-color:var(--com);color:var(--com);}
  .icon-card svg{width:32px;height:32px;}
  .poster-zone{cursor:pointer;transition:all .15s;}
  .poster-zone:hover{filter:brightness(1.4);}
  .poster-zone.active{outline:2px solid var(--com);outline-offset:-2px;}
  /* poster preview live */
  .poster-preview{aspect-ratio: 0.707; background:#fff;color:#000;border-radius:6px;padding:24px;font-family:'Inter',sans-serif;display:flex;flex-direction:column;gap:10px;}
  .timer-big{font-family:'JetBrains Mono',monospace;font-size:72px;font-weight:700;}
  .scene-row{display:grid;grid-template-columns:60px 1fr 90px;gap:10px;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);}
  table.script{width:100%;border-collapse:collapse;}
  table.script th, table.script td{border:1px solid #2a2a2a;padding:8px;text-align:left;font-size:12px;vertical-align:top;}
  table.script th{background:#1a1a1a;color:var(--com);font-size:11px;text-transform:uppercase;letter-spacing:.05em;}
  table.script input, table.script textarea{background:transparent;border:0;width:100%;color:#e6e6e6;font:inherit;resize:vertical;}
  table.script textarea{min-height:50px;}
  /* poster zones SVG fill */
  .pz-fill{fill:#2a1208;transition:all .2s;}
  .pz-fill:hover{fill:#3c1a0a;}
  .photo-card{position:relative;}
  .photo-card.taken{border-color:#5cc0ff;background:#08172a;}
  .photo-card.selected{border-color:var(--accent);background:#0a1f15;}
</style>
</head>
<body class="min-h-screen">

<!-- Sticky banner -->
<div class="sticky top-0 z-40 border-b border-[var(--border)]" style="background:linear-gradient(90deg,#2a1208,#0a0a0a);">
  <div class="px-6 py-2.5 flex items-center justify-between text-sm">
    <div class="flex items-center gap-3">
      <span class="pulse-dot"></span>
      <span class="mono com">🎪 Team Comunicación</span>
      <span class="muted">— contá lo que construimos: afiche, video, stand y feria.</span>
    </div>
    <div class="flex items-center gap-4 text-xs muted">
      <span>Curso interno · Team Comunicación</span>
      <span class="chip mono" style="border-color:#553318;color:#ff8855;">v1.0</span>
    </div>
  </div>
</div>

<!-- Layout -->
<div class="flex" style="min-height:calc(100vh - 41px);">

  <!-- SIDEBAR -->
  <aside id="sidebar" class="border-r border-[var(--border)] flex-shrink-0 flex flex-col" style="width:300px;background:#080808;">
    <div class="p-5 border-b border-[var(--border)]">
      <div class="flex items-center gap-3 mb-1">
        <div class="com-logo">🎪</div>
        <div>
          <div class="text-sm font-semibold">Arduino desde Cero</div>
          <div class="text-[11px] com mono">Comunicación · Afiche · Video · Stand</div>
        </div>
      </div>
      <div class="mt-4">
        <div class="flex justify-between text-[11px] muted mb-1.5">
          <span>Progreso total</span>
          <span><span id="progress-num">0</span>/17</span>
        </div>
        <div class="progress-bar"><div id="progress-fill" style="width:0%"></div></div>
      </div>
    </div>

    <nav id="module-nav" class="flex-1 overflow-y-auto py-2"></nav>

    <div class="p-3 border-t border-[var(--border)] space-y-2">
      <button onclick="openMasterChecklist()" class="btn w-full justify-center">
        ✓ Checklist maestra
      </button>
      <button onclick="resetProgress()" class="btn btn-ghost w-full justify-center text-[11px] muted">Reiniciar progreso</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main id="main" class="flex-1 overflow-x-hidden">
    <div id="module-content" class="max-w-[1000px] mx-auto px-10 py-10 fade-in"></div>

    <div class="max-w-[1000px] mx-auto px-10 pb-16 flex items-center justify-between">
      <button id="prev-btn" class="btn">← Anterior</button>
      <button id="mark-done" class="btn btn-accent">Marcar como completado ✓</button>
      <button id="next-btn" class="btn">Siguiente →</button>
    </div>
  </main>
</div>

<!-- Master checklist modal -->
<div id="master-modal" class="fixed inset-0 z-50 hidden items-center justify-center" style="background:rgba(0,0,0,.75);">
  <div class="panel-2 w-[720px] max-w-[95vw] max-h-[90vh] overflow-y-auto p-6">
    <div class="flex justify-between items-start mb-4">
      <h2 class="text-lg font-semibold">✓ Checklist maestra del Team Comunicación</h2>
      <button onclick="closeMasterChecklist()" class="btn">✕</button>
    </div>
    <div id="master-content"></div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast">Copiado</div>

<!-- =========================================================== -->
<script>
const BLOCKS = [
  { id:'b1', title:'Bloque 1 · Identidad y narrativa' },
  { id:'b2', title:'Bloque 2 · Materiales de comunicación' },
  { id:'b3', title:'Bloque 3 · Video del proceso' },
  { id:'b4', title:'Bloque 4 · Scrum del team Comunicación' },
];
const MODULES = [
  { id:'m1.1', block:'b1', num:'1.1', title:'¿Qué historia contamos?', level:'basico' },
  { id:'m1.2', block:'b1', num:'1.2', title:'Identidad visual del proyecto', level:'basico' },
  { id:'m1.3', block:'b1', num:'1.3', title:'El nombre y el eslogan', level:'basico' },

  { id:'m2.1', block:'b2', num:'2.1', title:'El afiche de la feria', level:'inter' },
  { id:'m2.2', block:'b2', num:'2.2', title:'Decoración del stand y del aula', level:'inter' },
  { id:'m2.3', block:'b2', num:'2.3', title:'Fotografía del proceso', level:'inter' },
  { id:'m2.4', block:'b2', num:'2.4', title:'Autoevaluación Bloque 2', level:'inter' },

  { id:'m3.1', block:'b3', num:'3.1', title:'Planificación: el guión del video', level:'inter' },
  { id:'m3.2', block:'b3', num:'3.2', title:'Técnicas de filmación con celular', level:'inter' },
  { id:'m3.3', block:'b3', num:'3.3', title:'Edición del video con CapCut', level:'avanz' },
  { id:'m3.4', block:'b3', num:'3.4', title:'El QR para el stand', level:'inter' },
  { id:'m3.5', block:'b3', num:'3.5', title:'Ensayo general del día de la feria', level:'avanz' },
  { id:'m3.6', block:'b3', num:'3.6', title:'Autoevaluación final + Entregables', level:'avanz' },

  { id:'m4.1', block:'b4', num:'4.1', title:'Backlog & historias de usuario', level:'basico' },
  { id:'m4.2', block:'b4', num:'4.2', title:'Sprintboard Kanban', level:'basico' },
  { id:'m4.3', block:'b4', num:'4.3', title:'Daily standup', level:'basico' },
  { id:'m4.4', block:'b4', num:'4.4', title:'Sprint Review + Retrospectiva', level:'basico' },
];

const STATE = {
  current: 'm1.1',
  done: JSON.parse(localStorage.getItem('com_done')||'{}'),
  notes: JSON.parse(localStorage.getItem('com_notes')||'{}'),
  quiz:  JSON.parse(localStorage.getItem('com_quiz')||'{}'),
  checks: JSON.parse(localStorage.getItem('com_checks')||'{}'),
  fields: JSON.parse(localStorage.getItem('com_fields')||'{}'),
  scrum: JSON.parse(localStorage.getItem('com_scrum')||'{}'),
};
STATE.scrum.stories = STATE.scrum.stories || null;
STATE.scrum.dailies = STATE.scrum.dailies || [];
STATE.scrum.review  = STATE.scrum.review  || {};
STATE.scrum.retro   = STATE.scrum.retro   || {};

function saveState(){
  localStorage.setItem('com_done', JSON.stringify(STATE.done));
  localStorage.setItem('com_notes', JSON.stringify(STATE.notes));
  localStorage.setItem('com_quiz', JSON.stringify(STATE.quiz));
  localStorage.setItem('com_checks', JSON.stringify(STATE.checks));
  localStorage.setItem('com_fields', JSON.stringify(STATE.fields));
  localStorage.setItem('com_scrum', JSON.stringify(STATE.scrum));
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),1800);
}
async function copyText(text){
  try{ await navigator.clipboard.writeText(text); toast('📋 Copiado al portapapeles'); }
  catch{ toast('No se pudo copiar'); }
}
function badge(level){
  if(level==='basico') return `<span class="chip badge-basico">🟢 Básico</span>`;
  if(level==='inter')  return `<span class="chip badge-inter">🟡 Intermedio</span>`;
  return `<span class="chip badge-avanz">🔴 Avanzado</span>`;
}
function setField(id, val){ STATE.fields[id]=val; saveState(); }
function getField(id, def=''){ return STATE.fields[id] ?? def; }
function setCheck(id, val){ STATE.checks[id]=val; saveState(); }
function getCheck(id){ return !!STATE.checks[id]; }

function renderSidebar(){
  const nav=document.getElementById('module-nav');
  let html='';
  for(const b of BLOCKS){
    html += `<div class="block-label">${b.title}</div>`;
    for(const m of MODULES.filter(x=>x.block===b.id)){
      const cls = m.id===STATE.current ? 'active' : '';
      const done = STATE.done[m.id] ? 'done' : 'pending';
      html += `<div class="module-link ${cls} ${done}" onclick="goTo('${m.id}')">
        <div class="flex items-center justify-between">
          <span><span class="mono muted">${m.num}</span>  ${m.title}</span>
        </div>
      </div>`;
    }
  }
  nav.innerHTML=html;
  const doneCount = Object.values(STATE.done).filter(Boolean).length;
  document.getElementById('progress-num').textContent = doneCount;
  document.getElementById('progress-fill').style.width = ((doneCount/MODULES.length)*100).toFixed(1)+'%';
}
function goTo(id){ STATE.current=id; renderSidebar(); renderModule(id); document.getElementById('main').scrollTo({top:0,behavior:'smooth'}); }
function nextModule(){ const idx=MODULES.findIndex(m=>m.id===STATE.current); if(idx<MODULES.length-1) goTo(MODULES[idx+1].id); }
function prevModule(){ const idx=MODULES.findIndex(m=>m.id===STATE.current); if(idx>0) goTo(MODULES[idx-1].id); }
function markDone(){ STATE.done[STATE.current]=true; saveState(); renderSidebar(); toast('✓ Módulo completado'); setTimeout(nextModule,500); }
function resetProgress(){
  if(!confirm('¿Reiniciar todo el progreso?')) return;
  STATE.done={};STATE.notes={};STATE.quiz={};STATE.checks={};STATE.fields={};STATE.scrum={stories:null,dailies:[],review:{},retro:{}};
  saveState(); renderSidebar(); renderModule(STATE.current);
}

document.addEventListener('DOMContentLoaded', ()=>{
  document.getElementById('next-btn').onclick=nextModule;
  document.getElementById('prev-btn').onclick=prevModule;
  document.getElementById('mark-done').onclick=markDone;
  renderSidebar();
  renderModule(STATE.current);
});
</script>

<script>
function moduleHeader(m){
  const blockTitle = BLOCKS.find(b=>b.id===m.block).title.split('·')[1].trim();
  return `
    <div class="flex items-center justify-between mb-2">
      <div class="text-xs mono muted">Módulo ${m.num} · ${blockTitle}</div>
      ${badge(m.level)}
    </div>
    <h1 class="text-3xl font-semibold mb-1 tracking-tight">${m.title}</h1>
    <div class="h-px bg-[var(--border)] my-6"></div>`;
}
function notesPanel(id){
  const val=(STATE.notes[id]||'').replace(/</g,'&lt;');
  return `
    <div class="panel p-4 mt-8">
      <div class="flex items-center gap-2 mb-2">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
        <span class="text-sm">Mis notas</span>
        <span class="text-[10px] muted">(se guardan automáticamente)</span>
      </div>
      <textarea oninput="STATE.notes['${id}']=this.value;saveState();" placeholder="Escribí tus notas sobre este módulo..."
        class="w-full bg-[var(--surface2)] border border-[var(--border)] rounded p-3 text-sm font-mono"
        style="min-height:80px;resize:vertical;">${val}</textarea>
    </div>`;
}
function renderModule(id){
  const m=MODULES.find(x=>x.id===id);
  if(!m) return;
  const out=document.getElementById('module-content');
  out.classList.remove('fade-in'); void out.offsetWidth; out.classList.add('fade-in');
  out.innerHTML = MOD_BODY[id](m) + notesPanel(id);
  if(MOD_AFTER[id]) MOD_AFTER[id]();
}

const MOD_BODY={}; const MOD_AFTER={};

/* ============ M 1.1 ============ */
MOD_BODY['m1.1'] = (m) => `
${moduleHeader(m)}
<p class="text-base muted mb-6">Comunicación no es "decorar al final": es <strong>contar una historia</strong>. Esa historia tiene un arco, igual que una película.</p>

<!-- Arco narrativo interactivo -->
<div class="panel p-6 mb-6">
  <div class="text-xs mono muted mb-4">ARCO NARRATIVO DEL PROYECTO</div>
  <div class="grid grid-cols-6 gap-2 mb-4">
    ${['Problema','Idea','Diseño','Construcción','Prueba','Resultado'].map((s,i)=>`
      <div class="text-center cursor-pointer arc-step" data-step="${i}">
        <div class="w-12 h-12 mx-auto rounded-full flex items-center justify-center mb-2"
             style="background:#1a1a1a;border:2px solid #333;font-size:18px;">
          ${['❓','💡','📐','🔧','🧪','🌱'][i]}
        </div>
        <div class="text-[11px] mono">${s}</div>
      </div>
    `).join('')}
  </div>
  <div id="arc-info" class="panel-2 p-4 text-sm muted">
    👆 Hacé click en cada etapa para ver qué contenido visual corresponde.
  </div>
</div>

<!-- Mostrar vs Contar -->
<div class="grid grid-cols-2 gap-4 mb-6">
  <div class="panel p-5">
    <div class="text-xs muted mb-2">✗ Mostrar QUÉ hicimos</div>
    <div class="text-sm mb-3">"Conectamos un sensor de humedad a un Arduino UNO. Programamos un script en Python. Hicimos un gráfico con matplotlib."</div>
    <div class="text-[11px]" style="color:#ff7788">→ Aburrido. Técnico. No engancha al visitante.</div>
  </div>
  <div class="panel p-5" style="border-color:#553318;">
    <div class="text-xs com mb-2">✓ Contar POR QUÉ importa</div>
    <div class="text-sm mb-3">"¿Cuántas plantas se mueren cada año porque alguien se olvidó de regarlas? Nosotros construimos un sistema que riega solo cuando la tierra está seca."</div>
    <div class="text-[11px] com">→ Engancha. Resuelve un problema real.</div>
  </div>
</div>

<!-- 3 preguntas del team -->
<div class="panel p-6 mb-6" style="background:#1a0d05;border-color:#553318;">
  <div class="flex items-center gap-2 mb-2">
    <span style="font-size:20px">📝</span>
    <div class="font-semibold">Ejercicio grupal — respondan las 3 preguntas clave</div>
  </div>
  <p class="text-xs muted mb-4">Estas respuestas son la <strong>base del afiche y del video</strong>. Pónganse de acuerdo entre todos antes de seguir.</p>

  <div class="space-y-4">
    <div>
      <label class="text-xs muted">1. ¿Qué problema resuelve nuestro sistema?</label>
      <textarea oninput="setField('q1',this.value)" class="w-full bg-[var(--bg)] border border-[var(--border)] rounded p-3 text-sm mt-1" style="min-height:60px;"
        placeholder="Ej: las plantas se mueren cuando uno se olvida de regarlas...">${getField('q1')}</textarea>
    </div>
    <div>
      <label class="text-xs muted">2. ¿Quién se beneficia de esto?</label>
      <textarea oninput="setField('q2',this.value)" class="w-full bg-[var(--bg)] border border-[var(--border)] rounded p-3 text-sm mt-1" style="min-height:60px;"
        placeholder="Ej: gente que viaja, oficinas, escuelas, productores...">${getField('q2')}</textarea>
    </div>
    <div>
      <label class="text-xs muted">3. ¿Qué fue lo más difícil de construir?</label>
      <textarea oninput="setField('q3',this.value)" class="w-full bg-[var(--bg)] border border-[var(--border)] rounded p-3 text-sm mt-1" style="min-height:60px;"
        placeholder="Ej: calibrar el sensor para que active la bomba en el momento justo...">${getField('q3')}</textarea>
    </div>
  </div>
</div>

<div class="panel p-4" style="background:#1a0d05;">

function answerQuiz(quizId, qi, oj){
  STATE.quiz[quizId] = STATE.quiz[quizId] || {};
  if(STATE.quiz[quizId][qi] !== undefined) return;
  const QQ = quizId==='q24' ? QUIZ_24 : QUIZ_FINAL;
  const correct = QQ[qi].correct;
  STATE.quiz[quizId][qi] = oj;
  saveState();
  const panel = document.querySelector(`[data-qidx="${qi}"]`);
  panel.querySelectorAll('.quiz-opt').forEach((el,idx)=>{
    el.classList.add('disabled');
    if(idx===correct) el.classList.add('correct');
    if(idx===oj && idx!==correct) el.classList.add('wrong');
  });
  panel.querySelector('.explain').classList.remove('hidden');
  const score = Object.entries(STATE.quiz[quizId]).filter(([k,v])=> v===QQ[k].correct).length;
  const elScore = document.getElementById(quizId==='q24'?'score-24':'score-final');
  if(elScore) elScore.textContent = score+' / '+QQ.length;
}
function reviewQuiz(quizId){ STATE.quiz[quizId]={}; saveState(); renderModule(STATE.current); }

function genQR(){
  const url = document.getElementById('qr-url')?.value || '';
  const out = document.getElementById('qr-out');
  if(!out) return;
  out.innerHTML = '';
  if(!url.trim()){ out.innerHTML='<div class="text-xs muted p-6 text-center">Pegá una URL</div>'; return; }
  try{
    new QRCode(out, { text:url, width:208, height:208, colorDark:'#000', colorLight:'#fff', correctLevel: QRCode.CorrectLevel.H });
  }catch(e){ console.log(e); }
}
function testQR(){
  const url = document.getElementById('qr-url')?.value;
  if(url) window.open(url,'_blank');
}
function downloadQR(){
  const img = document.querySelector('#qr-out img') || document.querySelector('#qr-out canvas');
  if(!img){ toast('No se pudo descargar el QR'); return; }
  const a = document.createElement('a');
  a.href = img.src || img.toDataURL('image/png');
  a.download = 'qr-video.png';
  a.click();
}

let TIMER_INTERVAL=null, TIMER_SEC=120, TIMER_PAUSED=false;
function startTimer(){
  document.getElementById('timer-panel').style.display='block';
  resetTimer(); TIMER_PAUSED=false;
  TIMER_INTERVAL = setInterval(tickTimer, 1000);
}
function tickTimer(){
  if(TIMER_PAUSED) return;
  TIMER_SEC--;
  const m = Math.floor(TIMER_SEC/60), s = TIMER_SEC%60;
  const d = document.getElementById('timer-display');
  if(!d){clearInterval(TIMER_INTERVAL);return;}
  d.textContent = m+':'+String(s).padStart(2,'0');
  if(TIMER_SEC===30) toast('⏰ Quedan 30 segundos');
  if(TIMER_SEC<=10) d.style.color='var(--red)';
  else if(TIMER_SEC<=30) d.style.color='var(--yellow)';
  else d.style.color='var(--com)';
  if(TIMER_SEC<=0){ clearInterval(TIMER_INTERVAL); document.getElementById('timer-status').textContent='¡Tiempo!'; toast('⏰ ¡Se acabó el tiempo!'); }
}
function pauseTimer(){ TIMER_PAUSED=!TIMER_PAUSED; document.getElementById('timer-status').textContent = TIMER_PAUSED?'Pausado':'Corriendo...'; }
function resetTimer(){ TIMER_SEC=120; const d=document.getElementById('timer-display'); if(d){d.textContent='2:00'; d.style.color='var(--com)';} }
function closeTimer(){ clearInterval(TIMER_INTERVAL); document.getElementById('timer-panel').style.display='none'; }

<style>
  .kbn-card{background:#0a0a0a;border:1px solid var(--border);border-radius:8px;padding:10px;cursor:grab;font-size:12px;transition:all .15s;}

<div id="kbn-modal" class="fixed inset-0 z-50 hidden items-center justify-center" style="background:rgba(0,0,0,.7);">

MOD_AFTER['m4.2'] = () => { renderBoard(); };
function renderBoard(){
  const stories = getStories();
  const fs = document.getElementById('kbn-sprint')?.value || 'all';
  const ft = document.getElementById('kbn-type')?.value || 'all';
  ['todo','doing','review','done'].forEach(col=>{
    const drop = document.querySelector(`.kanban-drop[data-col="${col}"]`);
    if(!drop) return;
    drop.innerHTML='';
    const items = stories.filter(s=>s.col===col && (fs==='all'||s.sprint==+fs) && (ft==='all'||s.type===ft));
    document.getElementById('cnt-'+col).textContent = items.length;
    items.forEach(st=>{
      const tb = typeBadge(st.type);
      const card = document.createElement('div');
      card.className='kbn-card'+(st.blocked?' blocked':'');
      card.draggable=true;
      card.innerHTML = `
        <div class="flex items-start gap-1 flex-wrap mb-2">
          <span class="chip mono" style="font-size:9px;padding:1px 5px;">S${st.sprint}</span>
          ${tb}
          ${st.blocked?'<span title="'+(st.blockReason||'')+'">🚫</span>':''}
        </div>
        <div>${st.title}</div>
        ${st.who?`<div class="who">👤 ${st.who}</div>`:''}
      `;
      card.addEventListener('dragstart', e=>{ e.dataTransfer.setData('text/plain', st.id); card.classList.add('dragging'); });
      card.addEventListener('dragend',()=>card.classList.remove('dragging'));
      card.addEventListener('click',()=>openStoryModal(st.id));
      drop.appendChild(card);
    });
  });
  document.querySelectorAll('.kanban-drop').forEach(drop=>{
    drop.ondragover = e=>{ e.preventDefault(); drop.classList.add('drag-over'); };
    drop.ondragleave = ()=> drop.classList.remove('drag-over');
    drop.ondrop = e=>{
      e.preventDefault(); drop.classList.remove('drag-over');
      const id = e.dataTransfer.getData('text/plain');
      const s = findStory(id);
      if(s){ s.col = drop.dataset.col; saveScrum(); renderBoard(); }
    };
  });
}
function openStoryModal(id){
  const s = findStory(id); if(!s) return;
  const modal = document.getElementById('kbn-modal');
  modal.classList.remove('hidden'); modal.classList.add('flex');
  document.getElementById('kbn-modal-body').innerHTML = `
    <div class="flex items-center gap-2 mb-2 flex-wrap">
      <span class="chip mono">Sprint ${s.sprint}</span>
      ${typeBadge(s.type)}
      ${s.blocked?'<span class="chip badge-avanz">🚫 Bloqueada</span>':''}
    </div>
    <h3 class="text-base font-semibold mb-3">${s.title}</h3>
    <div class="panel-2 p-3 mb-3 text-xs"><span class="muted">Criterio:</span><br>✓ <em>${s.crit}</em></div>
    <label class="text-xs muted">¿Quién lo tiene?</label>
    <input type="text" value="${s.who||''}" placeholder="Tu nombre"
      class="w-full bg-[var(--bg)] border border-[var(--border)] rounded p-2 text-sm mono mt-1 mb-3"
      oninput="findStory('${s.id}').who=this.value;saveScrum();"/>
    <label class="text-xs muted">Estado</label>
    <select class="w-full bg-[var(--bg)] border border-[var(--border)] rounded p-2 text-sm mono mt-1 mb-3"
      onchange="findStory('${s.id}').col=this.value;saveScrum();renderBoard();">
      <option value="todo" ${s.col==='todo'?'selected':''}>📋 Por hacer</option>
      <option value="doing" ${s.col==='doing'?'selected':''}>🔄 En progreso</option>
      <option value="review" ${s.col==='review'?'selected':''}>👁️ En revisión</option>
      <option value="done" ${s.col==='done'?'selected':''}>✅ Hecho</option>
    </select>
    <label class="text-xs muted flex items-center gap-2">
      <input type="checkbox" ${s.blocked?'checked':''} class="accent-[var(--com)]"
        onchange="findStory('${s.id}').blocked=this.checked;saveScrum();renderBoard();"/> Bloqueada
    </label>
    <input type="text" value="${s.blockReason||''}" placeholder="¿Por qué está bloqueada?"
      class="w-full bg-[var(--bg)] border border-[var(--border)] rounded p-2 text-xs mono mt-2"
      oninput="findStory('${s.id}').blockReason=this.value;saveScrum();"/>
  `;
}
function closeStoryModal(){ document.getElementById('kbn-modal').classList.add('hidden'); document.getElementById('kbn-modal').classList.remove('flex'); renderBoard(); }
function resetBoard(){
  if(!confirm('¿Resetear el tablero?')) return;
  STATE.scrum.stories = JSON.parse(JSON.stringify(DEFAULT_STORIES));
  saveScrum(); renderBoard();
}
function exportDaily(){
  const stories = getStories();
  const cols = {todo:'📋 Por hacer', doing:'🔄 En progreso', review:'👁️ En revisión', done:'✅ Hecho'};
  let txt = `REPORTE TEAM COMUNICACIÓN — ${new Date().toLocaleDateString('es-AR')}\n` + '═'.repeat(50)+'\n';
  for(const col of Object.keys(cols)){
    const items = stories.filter(s=>s.col===col);
    if(!items.length) continue;
    txt += `\n${cols[col]} (${items.length})\n`;
    items.forEach(s=> txt += `  • [S${s.sprint}|${s.type}] ${s.title}${s.who?' — '+s.who:''}${s.blocked?' 🚫':''}\n`);
  }
  const blk = stories.filter(s=>s.blocked);
  if(blk.length){ txt += `\n🚫 BLOQUEOS\n`; blk.forEach(s=> txt += `  • ${s.title}\n    razón: ${s.blockReason||'(sin razón)'}\n`); }
  copyText(txt);
}

function saveDaily(){
  const name = document.getElementById('d-name').value.trim();
  const done = document.getElementById('d-done').value.trim();
  const today = document.getElementById('d-today').value.trim();
  const block = document.getElementById('d-block').value.trim();
  if(!name && !done && !today){ toast('Completá al menos algo'); return; }
  const ts = new Date().toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
  STATE.scrum.dailies.push({name,done,today,block,ts});
  saveScrum(); toast('✓ Daily registrado'); renderModule(STATE.current);
}

/* ============ Master checklist ============ */
function openMasterChecklist(){
  const m = document.getElementById('master-modal');
  m.classList.remove('hidden'); m.classList.add('flex');
  const groups = [
    {t:'Afiche (Módulo 2.1)', ids:[['a-1','El título se lee desde 3 metros'],['a-2','Hay al menos un gráfico o dato'],['a-3','Fotos reales del proceso'],['a-4','QR funciona y lleva al video'],['a-5','Nombres del equipo visibles'],['a-6','Impreso en al menos A2']]},
    {t:'Stand (Módulo 2.2)', ids:[['s-1','Afiche impreso'],['s-2','Cartelitos laminados'],['s-3','Mantel verde'],['s-4','Maceta funcionando'],['s-5','Tablet/notebook para video'],['s-6','Extensión eléctrica'],['s-7','Display de fondo'],['s-8','Cinta / chinches']]},
    {t:'Filmación (Módulo 3.2)', ids:[['f-1','Batería 100%'],['f-2','Espacio libre'],['f-3','Modo avión'],['f-4','Brillo manual'],['f-5','Guión a mano'],['f-6','Lente limpia']]},
    {t:'QR (Módulo 3.4)', ids:[['qr-1','Video en YouTube'],['qr-2','QR probado 3 celulares'],['qr-3','Tamaño mínimo 4×4 cm'],['qr-4','Texto al lado del QR']]},
    {t:'Día de la feria (Módulo 3.5)', ids:[['d-1','Arduino cargado'],['d-2','Video en loop'],['d-3','Afiche colgado'],['d-4','Cartelitos pegados'],['d-5','Cada uno sabe su parte'],['d-6','Sistema probado 1h antes'],['d-7','Siempre alguien en el stand']]},
    {t:'Entregables (Módulo 3.6)', ids:DELIVERABLES},
  ];
  let total=0, done=0;
  let html = '';
  for(const g of groups){
    const sub = g.ids.length;
    const subDone = g.ids.filter(([id])=>getCheck(id)).length;
    total += sub; done += subDone;
    html += `<div class="panel-2 p-4 mb-3">
      <div class="flex justify-between items-center mb-2">
        <div class="font-semibold text-sm">${g.t}</div>
        <div class="text-xs com mono">${subDone}/${sub}</div>
      </div>
      ${g.ids.map(([id,t])=>`
        <label class="flex items-start gap-3 cursor-pointer text-xs py-1">
          <input type="checkbox" class="mt-1 accent-[var(--com)]" ${getCheck(id)?'checked':''} onchange="setCheck('${id}',this.checked);openMasterChecklist();"/>
          <span>${t}</span>
        </label>
      `).join('')}
    </div>`;
  }
  const pct = Math.round(done/total*100);
  document.getElementById('master-content').innerHTML = `
    <div class="panel-2 p-4 mb-4" style="background:#1a0d05;">
      <div class="flex justify-between text-xs mb-2"><span class="muted">Progreso global</span><span class="com mono">${done}/${total} (${pct}%)</span></div>
      <div class="progress-bar"><div style="width:${pct}%"></div></div>
    </div>
    ${html}
  `;
}
function closeMasterChecklist(){ const m=document.getElementById('master-modal'); m.classList.add('hidden'); m.classList.remove('flex'); }
</script>
